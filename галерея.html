    <style>
        .gallery-section {
            padding: 2rem 1rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .gallery-section h2 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 2rem;
            color: #333; 
            letter-spacing: 1px;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            justify-items: center;
            align-items: start;
        }
        
        .gallery-item {
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 100%;
            max-width: 320px;
            text-align: center;
            padding-bottom: 1rem;
        }
        
        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        .gallery-imgsrc="я.jpg" style="width: 300px; height: 300px;object-fit: cover;" >
            width: 100%;
            height: 280px;
            overflow: hidden;
            background-color: #f9f3ec;
        }
        
        .gallery-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            display: block;
        }
        
        .gallery-item:hover .gallery-img img {
            transform: scale(1.03);
        }
        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: #333; 
            margin-top: 2rem;
            border-top: 1px solid #e6d5c8;
            font-size: 0.9rem;
            color: #fff; 
        }
        @media (max-width: 768px) {
            .gallery-grid {
                gap: 1rem;
            }
            .gallery-section h2 {
                font-size: 1.8rem;
            }
        }
        body {
            background-color: #fffaf5;
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
        }
        
        main {
            min-height: 70vh;
        }
    </style>
</head>
